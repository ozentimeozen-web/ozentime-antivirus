<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ozentime AV 1.2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }
    header {
      padding: 40px;
      animation: fadeDown 1.5s ease;
    }
    h1 {
      font-size: 3em;
      margin: 0;
      text-shadow: 2px 2px 8px #000;
    }
    .btn {
      display: inline-block;
      margin: 20px;
      padding: 15px 30px;
      font-size: 1.2em;
      color: #fff;
      background: #ff0000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s, background 0.3s;
    }
    .btn:hover {
      transform: scale(1.1);
      background: #cc0000;
    }
    .info-box {
      margin: 30px auto;
      max-width: 600px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      animation: fadeUp 2s ease;
    }
    @keyframes fadeDown {
      from {opacity: 0; transform: translateY(-50px);}
      to {opacity: 1; transform: translateY(0);}
    }
    @keyframes fadeUp {
      from {opacity: 0; transform: translateY(50px);}
      to {opacity: 1; transform: translateY(0);}
    }
    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 0.9em;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ozentime Antivirus</h1>
    <p>Version 1.1 Pro & 1.2 Max</p>
  </header>

  <!-- Corrected Download Buttons -->
  <button class="btn" onclick="window.location.href='downloads/sandbox.exe'">
    Download 1.1 Pro
  </button>

  <button class="btn" onclick="window.location.href='downloads/ozentime1.2max.exe'">
    Download 1.2 Max
  </button>

  <!-- Red Alert Info -->
  <div class="info-box">
    <h2>Red Alert Mode</h2>
    <p>
      🚨 Under development. The shield indicator works, but pressing the Red Alert button will not trigger any action in this version.  
      Future builds will auto‑activate Red Alert during severe threats.
    </p>
  </div>

  <footer>
    &copy; 2026 Ozentime Security Labs
  </footer>
</body>
</html>
