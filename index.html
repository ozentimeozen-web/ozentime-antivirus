<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ozentime AV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #fff;
      overflow-x: hidden;
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      animation: fadeIn 2s ease-in;
    }

    .hero h1 {
      font-size: 3em;
      margin: 0;
      color: #1e90ff;
      animation: slideUp 2s ease-in-out;
    }

    .hero p {
      font-size: 1.2em;
      margin-top: 10px;
      animation: slideUp 2.5s ease-in-out;
    }

    /* Shield */
    .shield {
      width: 150px;
      height: 200px;
      background: linear-gradient(180deg, #1e90ff, #004080);
      clip-path: polygon(50% 0%, 100% 25%, 85% 100%, 15% 100%, 0% 25%);
      box-shadow: 0 0 25px rgba(30,144,255,0.8);
      animation: pulse 2s infinite;
      margin-top: 30px;
    }

    /* Accomplishments Section */
    .accomplishments {
      padding: 50px;
      text-align: center;
      animation: fadeIn 3s ease-in;
    }

    .accomplishments h2 {
      color: #1e90ff;
      margin-bottom: 20px;
    }

    .accomplishments ul {
      list-style: none;
      padding: 0;
    }

    .accomplishments li {
      margin: 10px 0;
      animation: slideUp 3s ease-in-out;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 25px rgba(30,144,255,0.8); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(30,144,255,1); }
      100% { transform: scale(1); box-shadow: 0 0 25px rgba(30,144,255,0.8); }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Ozentime Antivirus</h1>
    <p>Lightweight AI-powered protection</p>
    <div class="shield"></div>
  </section>

  <section class="accomplishments">
    <h2>Accomplishments</h2>
    <ul>
      <li>⚡ Cluster-based malware disinfection</li>
      <li>🔒 Always Scan background mode</li>
      <li>📧 Secure Gmail integration placeholder</li>
      <li>🛡️ Heuristic rebuild engine</li>
    </ul>
  </section>
</body>
</html>
