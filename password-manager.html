<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ozentime Password Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f4f4;
      color: #222;
    }
    header {
      background: linear-gradient(90deg, #003366, #006699);
      color: white;
      text-align: center;
      padding: 30px 20px;
    }
    h1 { margin: 0; }
    section {
      background: white;
      margin: 30px auto;
      padding: 30px;
      width: 80%;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 { color: #003366; }
    table {
      width: 100%; border-collapse: collapse; margin-top: 20px;
    }
    table, th, td { border: 1px solid #444; }
    th, td { padding: 10px; text-align: center; }
    th { background: #003366; color: white; }
    input, button {
      padding: 10px; margin: 5px 0;
      border: 1px solid #ccc; border-radius: 5px;
      width: 100%;
    }
    button {
      background: #006699; color: white; cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #004466; }
  </style>
</head>
<body>
  <header>
    <h1>Ozentime Password Manager</h1>
    <p>Securely store and manage your passwords</p>
  </header>

  <!-- Saved Passwords Section -->
  <section>
    <h2>Saved Accounts</h2>
    <table>
      <tr>
        <th>Website</th>
        <th>Username</th>
        <th>Password</th>
      </tr>
      <tr>
        <td>example.com</td>
        <td>user123</td>
        <td>••••••••</td>
      </tr>
      <tr>
        <td>mail.com</td>
        <td>ozentime</td>
        <td>••••••••</td>
      </tr>
    </table>
  </section>

  <!-- Add New Password Section -->
  <section>
    <h2>Add New Password</h2>
    <form>
      <label for="site">Website:</label>
      <input type="text" id="site" name="site" placeholder="Enter website URL">

      <label for="username">Username:</label>
      <input type="text" id="username" name="username" placeholder="Enter username">

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter password">

      <button type="submit">Save Password</button>
    </form>
  </section>
</body>
</html>
