<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ozentime AV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #fff;
      overflow-x: hidden;
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      animation: fadeIn 2s ease-in;
    }

    .hero h1 {
      font-size: 3em;
      margin: 0;
      color: #1e90ff;
      animation: slideUp 2s ease-in-out;
    }

    .hero p {
      font-size: 1.2em;
      margin-top: 10px;
      animation: slideUp 2.5s ease-in-out;
    }

    /* Shield (static, no glow) */
    .shield {
      width: 150px;
      height: 200px;
      background: #1e90ff;
      clip-path: polygon(50% 0%, 100% 25%, 85% 100%, 15% 100%, 0% 25%);
      margin-top: 30px;
    }

    /* Download Buttons */
    .downloads {
      text-align: center;
      padding: 40px;
      animation: fadeIn 3s ease-in;
    }

    .downloads h2 {
      color: #1e90ff;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      margin: 10px;
      background: #1e90ff;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #004080;
      transform: translateY(-3px);
    }

    /* Accomplishments Section */
    .accomplishments {
      padding: 50px;
      text-align: center;
      animation: fadeIn 3s ease-in;
    }

    .accomplishments h2 {
      color: #1e90ff;
      margin-bottom: 20px;
    }

    .accomplishments ul {
      list-style: none;
      padding: 0;
    }

    .accomplishments li {
      margin: 10px 0;
      animation: slideUp 3s ease-in-out;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Ozentime Antivirus</h1>
    <p>Lightweight AI-powered protection</p>
    <div class="shield"></div>
  </section>

  <section class="downloads">
    <h2>Download Ozentime AV</h2>
    <a href="sandbox.exe" class="btn">Download v1.2 Max</a>
    <a href="sandbox.exe" class="btn">Download v1.1 Pro</a>
  </section>

  <section class="accomplishments">
    <h2>Accomplishments</h2>
    <ul>
      <li>⚡ Cluster-based malware disinfection</li>
      <li>🔒 Always Scan background mode</li>
      <li>📧 Secure Gmail integration placeholder</li>
      <li>🛡️ Heuristic rebuild engine</li>
    </ul>
  </section>
</body>
</html>
